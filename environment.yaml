name: biodiscoverygym
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11           # matches Biomni >=3.11 requirement
  - pip

  # --- core data science ---
  - numpy==2.1            # pinned to match Biomni
  - pandas>=2.0
  - scipy>=1.11
  - scikit-learn>=1.3
  - statsmodels>=0.14
  - matplotlib>=3.7
  - seaborn>=0.12
  - networkx             # pathway / gene network analysis

  # --- bioinformatics (conda-forge / bioconda) ---
  - biopython            # gene ID mapping, sequence utilities
  - rdkit                # cheminformatics for drug response (PRISM/GDSC)

  # --- storage ---
  - pyarrow>=12.0
  - fastparquet
  - h5py

  # --- dev tooling ---
  - jupyter
  - ipykernel
  - tqdm
  - requests
  - pyyaml

  - pip:
    # pathway enrichment
    - gseapy>=1.0.4

    # survival analysis (TCGA)
    - lifelines>=0.27

    # dimensionality reduction
    - umap-learn

    # single-cell (optional modality; harmless now)
    - scanpy

    # gene annotation lookups (Stage 4 mechanism)
    - gget

    # semantic similarity scoring (Stage 4)
    - sentence-transformers>=2.2
    - faiss-cpu           # fast vector similarity; pairs with sentence-transformers

    # LLM orchestration — matches Biomni's langchain stack
    - langchain
    - langchain-anthropic
    - langchain-openai
    - langchain-community
    - langgraph==0.3.18   # pinned to match Biomni

    # LLM API clients
    - anthropic>=0.25
    - openai>=1.0

    # sealed label encryption
    - cryptography>=41

    # testing
    - pytest>=7.4
    - pytest-cov
